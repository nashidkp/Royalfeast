<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Royal Feast</title>
    <link rel="icon" href="./assets/images/favicon.jpg" type="image/jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        /* Theme tokens from index.html */
        :root {
            --rf-bg-main: #020309;
            --rf-bg-gradient: radial-gradient(circle at top, #18181f 0, #020309 55%);
            --rf-text-main: #f7f3e8;
            --rf-muted: #b3ac9c;
            --rf-premium: #d4af37;
            --rf-premium-dark: #b08b27;
            --rf-premium-soft: rgba(212, 175, 55, 0.18);
            --rf-glass-bg: rgba(255, 255, 255, 0.05);
            --rf-glass-border: rgba(212, 175, 55, 0.45);
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(10, 10, 10, 1)),
                var(--rf-bg-gradient);
            color: var(--rf-text-main);
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            /* space for navbar */
        }

        .glass-auth-card {
            background: var(--rf-glass-bg) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--rf-glass-border) !important;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-title {
            color: var(--rf-premium);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            border-radius: 12px !important;
            color: white !important;
            padding: 12px 18px !important;
            transition: all 0.3s ease !important;
        }

        .form-control:focus {
            border-color: var(--rf-premium) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3) !important;
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--rf-premium), var(--rf-premium-dark)) !important;
            border: none !important;
            border-radius: 50px !important;
            color: #0b0b0b !important;
            padding: 12px !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease !important;
            margin-top: 20px;
            width: 100%;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>

<body>
    <!-- start navbar -->
    <div class="navbar-wrapper">
        <nav class="navbar navbar-expand-lg glass-navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html#home">
                    <img src="./assets/images/foodoglogo.jpg" alt="..." width="70" height="60">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#home">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#about">About Us</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#products">Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#offers">Offers</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#contact">Contact Us</a>
                        </li>
                    </ul>
                    <a href="login.html" class="btn btn-warning ms-2">Login</a>
                </div>
            </div>
        </nav>
    </div>
    <!-- end navbar -->

    <div class="auth-container">
        <div class="glass-auth-card">
            <h2 class="auth-title">Create Account</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small text-uppercase fw-bold">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm your password" required>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-secondary" for="terms">
                        I agree to the <a href="#" class="text-warning text-decoration-none">Terms & Conditions</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-auth">Sign Up</button>
            </form>
            <div class="text-center mt-5">
                <p class="small text-secondary mb-0">Already have an account?
                    <a href="login.html" class="text-warning fw-bold text-decoration-none ms-1">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
